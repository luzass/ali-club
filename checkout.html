<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro - Ali+ Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:    #00CBC0;
            --secondary:  #005A9E;
            --accent:     #FFD700;
            --bg:         #FFF8F0;
            --dark:       #1A1A2E;
            --white:      #ffffff;
            --radius:     12px;
            --shadow:     0 8px 32px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .checkout-container {
            background-color: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .btn-back {
            position: absolute;
            top: 15px;
            left: 15px;
            color: var(--white);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 50px;
            transition: background 0.3s;
            z-index: 10;
        }

        .btn-back:hover { background: rgba(255, 255, 255, 0.35); }

        .checkout-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            padding: 40px 20px 30px;
            text-align: center;
            position: relative;
        }

        .checkout-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .checkout-header p { font-size: 1.1rem; opacity: 0.9; }

        .checkout-body { padding: 30px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-weight: 700; margin-bottom: 8px;
            color: var(--secondary); font-size: 0.95rem;
        }

        .form-control {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-family: 'Nunito', sans-serif;
            font-size: 1rem; transition: border-color 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); }

        .payment-methods { display: flex; gap: 15px; margin-bottom: 25px; }
        .payment-method {
            flex: 1; border: 2px solid #e0e0e0; border-radius: 8px;
            padding: 15px; text-align: center; cursor: pointer;
            transition: all 0.3s; font-weight: 700; color: #666;
        }
        .payment-method:hover { border-color: var(--primary); background-color: rgba(0, 203, 192, 0.05); }
        .payment-method.active { border-color: var(--primary); background-color: rgba(0, 203, 192, 0.1); color: var(--primary); }
        .payment-method input[type="radio"] { display: none; }

        #credit-card-info {
            display: none; background-color: #f9f9f9; padding: 20px;
            border-radius: 8px; margin-bottom: 25px;
        }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--accent), #ffb300);
            color: var(--dark); padding: 15px; border: none; border-radius: 50px;
            font-size: 1.2rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,215,0,0.4); transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.6); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .secure-badge {
            text-align: center; margin-top: 15px; font-size: 0.85rem; color: #888;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .loader {
            display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ==========================================
           MODAL PIX (POP-UP)
           ========================================== */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        
        .pix-modal {
            background: var(--white); border-radius: 20px; padding: 40px 30px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal-overlay.show .pix-modal { transform: translateY(0); }

        .pix-modal h2 { color: var(--secondary); margin-bottom: 10px; font-weight: 800; }
        .pix-modal p { color: #666; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        
        .qr-code-box {
            background: #f9f9f9; border: 2px dashed #ddd; border-radius: 12px;
            padding: 15px; margin: 0 auto 25px; width: 220px; height: 220px;
            display: flex; justify-content: center; align-items: center;
        }
        .qr-code-box img { max-width: 100%; max-height: 100%; border-radius: 8px; }

        .copy-paste-box {
            background: #f0f4f8; border: 1px solid #d1e3f0; border-radius: 8px;
            padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 25px;
        }
        .copy-paste-box input {
            flex: 1; border: none; background: transparent; font-family: monospace;
            font-size: 0.85rem; color: #555; outline: none;
        }
        .btn-copy {
            background: var(--primary); color: white; border: none; border-radius: 6px;
            padding: 8px 12px; font-weight: 700; cursor: pointer; transition: background 0.2s;
        }
        .btn-copy:hover { background: #009b92; }

        .btn-finish-pix {
            display: block; width: 100%; background: var(--secondary); color: white;
            padding: 14px; border-radius: 50px; text-decoration: none; font-weight: 700;
            transition: background 0.2s;
        }
        .btn-finish-pix:hover { background: #004070; }
    </style>
</head>
<body>

<!-- MODAL PIX -->
<div class="modal-overlay" id="pix-modal-overlay">
    <div class="pix-modal">
        <h2>Pague sua assinatura</h2>
        <p>Abra o app do seu banco, escolha a opção <strong>PIX QR Code</strong> ou copie o código abaixo.</p>
        
        <div class="qr-code-box">
            <!-- A imagem do QR Code em base64 entrará aqui -->
            <img id="pix-qr-image" src="" alt="QR Code PIX" style="display: none;">
            <div id="pix-qr-loader" class="loader" style="display: block; border-top-color: var(--secondary);"></div>
        </div>

        <div class="copy-paste-box">
            <input type="text" id="pix-copy-text" readonly value="Gerando código...">
            <button type="button" class="btn-copy" onclick="copyPixCode()">Copiar</button>
        </div>

        <!-- Botão para fechar o modal e ir para a página de obrigado -->
        <a href="obrigado.html" class="btn-finish-pix">Já fiz o pagamento</a>
    </div>
</div>

<div class="checkout-container">
    
    <div class="checkout-header">
        <a href="index.html" class="btn-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Voltar
        </a>
        <h1>Ali+ Club</h1>
        <p>Assinatura Mensal: <strong>R$ 15,90</strong></p>
    </div>

    <div class="checkout-body">
        <form id="checkout-form">
            
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" class="form-control" placeholder="Como está no documento" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="Para receber seu acesso" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="col form-group">
                    <label for="telefone">Celular (WhatsApp)</label>
                    <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>

            <label style="display: block; font-weight: 700; margin-bottom: 10px; color: var(--secondary);">Forma de Pagamento</label>
            <div class="payment-methods">
                <label class="payment-method active" id="label-pix">
                    <input type="radio" name="payment_type" value="PIX" checked>
                    PIX
                </label>
                <label class="payment-method" id="label-credit">
                    <input type="radio" name="payment_type" value="CREDIT_CARD">
                    Cartão de Crédito
                </label>
            </div>

            <div id="credit-card-info">
                <div class="row">
                    <div class="col form-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" class="form-control" placeholder="00000-000" maxlength="9">
                    </div>
                    <div class="col form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" class="form-control" placeholder="Ex: 123">
                    </div>
                </div>

                <div class="form-group">
                    <label for="cc-nome">Nome impresso no cartão</label>
                    <input type="text" id="cc-nome" class="form-control" placeholder="Ex: JOAO S SILVA">
                </div>
                <div class="form-group">
                    <label for="cc-numero">Número do Cartão</label>
                    <input type="text" id="cc-numero" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
                <div class="row">
                    <div class="col form-group">
                        <label for="cc-validade">Validade</label>
                        <input type="text" id="cc-validade" class="form-control" placeholder="MM/AA" maxlength="5">
                    </div>
                    <div class="col form-group">
                        <label for="cc-cvv">CVV</label>
                        <input type="text" id="cc-cvv" class="form-control" placeholder="123" maxlength="4">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
                <span id="btn-text">Finalizar Assinatura 🚀</span>
                <div class="loader" id="btn-loader"></div>
            </button>

            <div class="secure-badge">
                🔒 Ambiente 100% Seguro e Criptografado
            </div>
        </form>
    </div>
</div>

<script>
    // ==========================================
    // MÁSCARAS DE INPUT
    // ==========================================
    const maskCpf = (v) => v.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
    const maskPhone = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2').replace(/(-\d{4})\d+?$/, '$1');
    const maskCep = (v) => v.replace(/\D/g, '').replace(/(\d{5})(\d)/, '$1-$2').replace(/(-\d{3})\d+?$/, '$1');
    const maskCardNumber = (v) => v.replace(/\D/g, '').replace(/(\d{4})(\d)/, '$1 $2').replace(/(\d{4})(\d)/, '$1 $2').replace(/(\d{4})(\d)/, '$1 $2').replace(/( \d{4})\d+?$/, '$1');
    const maskExpiry = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '$1/$2').replace(/(\/\d{2})\d+?$/, '$1');

    document.getElementById('cpf').addEventListener('input', (e) => e.target.value = maskCpf(e.target.value));
    document.getElementById('telefone').addEventListener('input', (e) => e.target.value = maskPhone(e.target.value));
    document.getElementById('cep').addEventListener('input', (e) => e.target.value = maskCep(e.target.value));
    document.getElementById('cc-numero').addEventListener('input', (e) => e.target.value = maskCardNumber(e.target.value));
    document.getElementById('cc-validade').addEventListener('input', (e) => e.target.value = maskExpiry(e.target.value));
    document.getElementById('cc-cvv').addEventListener('input', (e) => e.target.value = e.target.value.replace(/\D/g, ''));

    // ==========================================
    // LÓGICA DE TROCA DE PAGAMENTO
    // ==========================================
    const radios = document.querySelectorAll('input[name="payment_type"]');
    const creditCardInfo = document.getElementById('credit-card-info');
    const labelPix = document.getElementById('label-pix');
    const labelCredit = document.getElementById('label-credit');

    radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'CREDIT_CARD') {
                creditCardInfo.style.display = 'block';
                labelCredit.classList.add('active'); labelPix.classList.remove('active');
                ['cep','numero','cc-nome','cc-numero','cc-validade','cc-cvv'].forEach(id => document.getElementById(id).required = true);
            } else {
                creditCardInfo.style.display = 'none';
                labelPix.classList.add('active'); labelCredit.classList.remove('active');
                ['cep','numero','cc-nome','cc-numero','cc-validade','cc-cvv'].forEach(id => document.getElementById(id).required = false);
            }
        });
    });

    // ==========================================
    // FUNÇÃO PARA COPIAR O PIX
    // ==========================================
    function copyPixCode() {
        const copyText = document.getElementById("pix-copy-text");
        copyText.select();
        copyText.setSelectionRange(0, 99999); // Para mobile
        navigator.clipboard.writeText(copyText.value).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = 'Copiado!';
            btn.style.background = '#28a745';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = 'var(--primary)';
            }, 2000);
        });
    }

    // ==========================================
    // ENVIO DO FORMULÁRIO
    // ==========================================
    document.getElementById('checkout-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const btnSubmit = document.getElementById('btn-submit');
        
        btnText.style.display = 'none';
        btnLoader.style.display = 'block';
        btnSubmit.disabled = true;

        const paymentType = document.querySelector('input[name="payment_type"]:checked').value;
        
        const customerData = {
            name: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            cpfCnpj: document.getElementById('cpf').value.replace(/\D/g, ''),
            phone: document.getElementById('telefone').value.replace(/\D/g, ''),
            billingType: paymentType,
            value: 15.90
        };

        if (paymentType === 'CREDIT_CARD') {
            const validade = document.getElementById('cc-validade').value.split('/');
            customerData.creditCard = {
                holderName: document.getElementById('cc-nome').value,
                number: document.getElementById('cc-numero').value.replace(/\D/g, ''),
                expiryMonth: validade[0],
                expiryYear: validade[1],
                ccv: document.getElementById('cc-cvv').value
            };
            customerData.address = {
                postalCode: document.getElementById('cep').value.replace(/\D/g, ''),
                addressNumber: document.getElementById('numero').value
            };
        }

        try {
            const response = await fetch('/api/criar-assinatura', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customerData)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                if (paymentType === 'PIX') {
                    // EXIBIR O MODAL DO PIX
                    const modal = document.getElementById('pix-modal-overlay');
                    modal.classList.add('show');
                    
                    // Preencher os dados do PIX que vieram do backend
                    // ATENÇÃO: O backend precisa enviar result.pixQrCode e result.pixCopyPaste
                    if (result.pixQrCode && result.pixCopyPaste) {
                        document.getElementById('pix-qr-loader').style.display = 'none';
                        const qrImage = document.getElementById('pix-qr-image');
                        qrImage.src = `data:image/png;base64,${result.pixQrCode}`;
                        qrImage.style.display = 'block';
                        document.getElementById('pix-copy-text').value = result.pixCopyPaste;
                    }

                } else {
                    // REDIRECIONA PARA A PÁGINA DE OBRIGADO (Cartão de Crédito)
                    window.location.href = "obrigado.html";
                }
            } else {
                alert("Erro ao processar: " + (result.error || "Verifique os dados e tente novamente."));
            }

        } catch (error) {
            console.error("Erro na requisição:", error);
            alert("Não foi possível conectar ao servidor. Verifique se o backend está rodando.");
        } finally {
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
            btnSubmit.disabled = false;
        }
    });
</script>

</body>
</html>
